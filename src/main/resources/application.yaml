spring:
  application:
    name: ibnv

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always

  flyway:
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_EMAIL}
    password: ${SPRING_EMAIL_PASSWORD}
    default-encoding: UTF-8

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  upload:
    dir: uploads/notas

jwt:
  secret: ${JWT_SECRET}

admin:
  secret: ${ADMIN_SECRET}